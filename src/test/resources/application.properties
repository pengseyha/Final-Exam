# Test configuration: SQLite so tests run against a real file DB without MySQL.
# (Production uses MySQL; the "h2" dev profile uses H2.)
spring.profiles.active=test

# Use the configured datasource for @DataJpaTest instead of an auto-substituted one.
spring.test.database.replace=none

spring.datasource.url=jdbc:sqlite:target/test-idcard.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.open-in-view=false

# SQLite allows a single writer; keep the pool small to avoid lock contention.
spring.datasource.hikari.maximum-pool-size=1

idcard.base-url=http://localhost:8080
idcard.photo.dir=target/test-photos
idcard.photo.max-size-bytes=2097152
idcard.photo.allowed-content-types=image/jpeg,image/png
