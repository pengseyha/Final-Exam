# Test configuration: in-memory H2 so the build does not require a running MySQL.
spring.profiles.active=test

spring.datasource.url=jdbc:h2:mem:idcard;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

idcard.base-url=http://localhost:8080
idcard.photo.dir=target/test-photos
idcard.photo.max-size-bytes=2097152
idcard.photo.allowed-content-types=image/jpeg,image/png
