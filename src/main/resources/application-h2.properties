# "h2" dev profile: run the app with no MySQL required.
#   ./mvnw spring-boot:run -Dspring-boot.run.profiles=h2
# Data lives only in memory and is reset on restart.
spring.datasource.url=jdbc:h2:mem:idcard;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Browse the in-memory DB at http://localhost:8080/h2-console
spring.h2.console.enabled=true
