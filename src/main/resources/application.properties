spring.application.name=id-card-manager

# ---- MySQL datasource ----
# Override via environment variables in production.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/id_card_manager?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ---- File upload limits (photos) ----
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ---- App-specific settings ----
# Base URL embedded into QR verification links.
idcard.base-url=${APP_BASE_URL:http://localhost:8080}
# Local directory where uploaded photos are stored.
idcard.photo.dir=${PHOTO_DIR:uploads/photos}
# Max accepted photo size in bytes (used for validation in the service layer).
idcard.photo.max-size-bytes=2097152
idcard.photo.allowed-content-types=image/jpeg,image/png
