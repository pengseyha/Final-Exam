# CHOICE_A = the Web server (the idcard-web Docker container, reached over SSH).
# SSH is published on host port 2222 by docker-compose.yml.
[web]
idcard-web ansible_host=127.0.0.1 ansible_port=2222

[web:vars]
ansible_user=root
ansible_ssh_pass=Hello@123
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
