name: CI/CD

# Run on every commit pushed to the repository (any branch), plus manual runs.
on:
  push:
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test (SQLite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build
        run: |
          chmod +x mvnw
          ./mvnw -B -ntp clean package -DskipTests

      - name: Test (SQLite)
        run: ./mvnw -B -ntp test
        # Tests run against the SQLite test DB; production uses MySQL.

      - name: Publish test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/*.xml
          if-no-files-found: ignore

      # On build/test failure: email the developer who committed (the HEAD commit
      # author) and CC the instructor. Requires SMTP_* repository secrets.
      - name: Email on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          from: "CI Bot <${{ secrets.SMTP_USERNAME }}>"
          to: ${{ github.event.head_commit.author.email }}
          cc: srengty@gmail.com
          subject: "❌ Build failed: ${{ github.repository }} #${{ github.run_number }}"
          body: |
            The build/test failed for ${{ github.repository }}.

            Commit:   ${{ github.sha }}
            Author:   ${{ github.event.head_commit.author.name }} <${{ github.event.head_commit.author.email }}>
            Message:  ${{ github.event.head_commit.message }}
            Branch:   ${{ github.ref_name }}

            See the run log:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  deploy:
    name: Deploy via Ansible
    needs: build-and-test          # only runs if build-and-test succeeded
    # Self-hosted runner registered on the web-server host so it can reach the
    # web container on 127.0.0.1:2222 (a GitHub-cloud runner cannot).
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Ansible playbook (deploy to Web Server)
        working-directory: ansible
        # The inventory already targets the web server (127.0.0.1:2222, root/Hello@123);
        # the runner host has ansible + sshpass installed.
        run: ansible-playbook deploy.yml
